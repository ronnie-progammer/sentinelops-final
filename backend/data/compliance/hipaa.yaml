framework: HIPAA
title: "HIPAA Security Rule Compliance Report"
version: "2013"
controls:
  - id: "164.308(a)(1)"
    name: "Security Management Process"
    category: "Administrative Safeguards"
    description: "Implement policies and procedures to prevent, detect, contain, and correct security violations."
    evidence_source: "Threat detection and response in /threats, alert acknowledgement logs"
  - id: "164.308(a)(5)"
    name: "Security Awareness and Training"
    category: "Administrative Safeguards"
    description: "Implement a security awareness and training program."
    evidence_source: "Compliance control framework documentation"
  - id: "164.308(a)(6)"
    name: "Security Incident Procedures"
    category: "Administrative Safeguards"
    description: "Implement policies and procedures to address security incidents."
    evidence_source: "Alert routing to Slack/PagerDuty, incident response timeline in /alerts"
  - id: "164.312(a)(1)"
    name: "Access Control"
    category: "Technical Safeguards"
    description: "Implement technical policies and procedures for electronic information systems."
    evidence_source: "Asset access controls, threat source IP tracking"
  - id: "164.312(b)"
    name: "Audit Controls"
    category: "Technical Safeguards"
    description: "Implement hardware, software, or procedural mechanisms to record and examine access to ePHI."
    evidence_source: "Alert logs with timestamps, threat timeline in /alerts and /threats"
